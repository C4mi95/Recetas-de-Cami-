<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas de Cami</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede5d4;
    --cream-darker: #e0d5c0;
    --brown-dark: #2c1f0e;
    --brown-mid: #5c3d1e;
    --brown-light: #8b6340;
    --olive: #6b7c4a;
    --olive-light: #8a9e60;
    --olive-pale: #c8d5a8;
    --taupe: #b8a88a;
    --taupe-light: #d4c9b0;
    --sand: #c9b89a;
    --red-cherry: #c0392b;
    --paper-texture: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      rgba(139, 99, 64, 0.06) 27px,
      rgba(139, 99, 64, 0.06) 28px
    );
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream-dark);
    background-image: var(--paper-texture);
    font-family: 'Lato', sans-serif;
    color: var(--brown-dark);
    min-height: 100vh;
  }

  /* ——— HEADER ——— */
  header {
    background-color: var(--cream);
    border-bottom: 2px solid var(--taupe);
    padding: 18px 32px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(92,61,30,0.10);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; flex-direction: column; line-height: 1; }
  .logo-main { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--brown-dark); font-weight: 700; }
  .logo-sub { font-family: 'Lato', sans-serif; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--olive); margin-top: 1px; }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn-primary { background: var(--olive); color: #fff; border: none; padding: 9px 20px; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: var(--olive-light); }

  .btn-ghost { background: transparent; border: 1.5px solid var(--taupe); color: var(--brown-mid); padding: 8px 16px; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.82rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; }
  .btn-ghost:hover { border-color: var(--olive); color: var(--olive); }

  /* ——— MAIN LAYOUT ——— */
  .app-wrapper { display: flex; min-height: calc(100vh - 68px); }

  /* ——— SIDEBAR ——— */
  .sidebar { width: 220px; flex-shrink: 0; background: var(--cream); border-right: 1.5px solid var(--taupe-light); padding: 28px 0; position: sticky; top: 68px; height: calc(100vh - 68px); overflow-y: auto; }
  .sidebar-title { font-family: 'Lato', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--taupe); padding: 0 22px 12px; border-bottom: 1px solid var(--taupe-light); margin-bottom: 8px; }
  .cat-item { display: flex; align-items: center; gap: 9px; padding: 9px 22px; cursor: pointer; transition: background 0.15s; font-size: 0.88rem; color: var(--brown-mid); font-weight: 400; border-left: 3px solid transparent; }
  .cat-item:hover { background: var(--cream-dark); }
  .cat-item.active { background: var(--cream-dark); border-left-color: var(--olive); color: var(--olive); font-weight: 700; }
  .cat-icon { font-size: 1rem; }
  .cat-count { margin-left: auto; background: var(--cream-darker); color: var(--taupe); font-size: 0.68rem; padding: 2px 7px; border-radius: 10px; font-weight: 700; }

  /* ——— CONTENT ——— */
  .content { flex: 1; padding: 32px 36px; overflow-y: auto; }
  .content-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
  .content-title { font-family: 'Dancing Script', cursive; font-size: 2.4rem; color: var(--brown-dark); line-height: 1; }
  .content-title span { display: block; font-family: 'Lato', sans-serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); margin-bottom: 4px; font-weight: 400; }

  /* ——— RECIPE GRID ——— */
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }

  .recipe-card { background: var(--cream); border: 1px solid var(--taupe-light); border-radius: 3px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; box-shadow: 2px 3px 8px rgba(92,61,30,0.07); position: relative; }
  .recipe-card:hover { transform: translateY(-3px); box-shadow: 4px 8px 20px rgba(92,61,30,0.13); }

  .card-tape { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 48px; height: 18px; background: rgba(184,168,138,0.55); border-radius: 2px; z-index: 2; }
  .card-img-wrap { width: 100%; height: 155px; overflow: hidden; position: relative; background: var(--cream-darker); display: flex; align-items: center; justify-content: center; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img-emoji { font-size: 2.5rem; color: var(--taupe); }

  .card-body { padding: 16px 18px 14px; background: var(--paper-texture), var(--cream); }
  .card-cat { font-size: 0.63rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--olive); font-weight: 700; margin-bottom: 5px; }
  .card-title { font-family: 'Dancing Script', cursive; font-size: 1.35rem; color: var(--brown-dark); line-height: 1.2; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 12px; font-size: 0.75rem; color: var(--taupe); }

  .add-card { background: transparent; border: 2px dashed var(--taupe-light); border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px; cursor: pointer; transition: border-color 0.2s, background 0.2s; gap: 10px; color: var(--taupe); }
  .add-card:hover { border-color: var(--olive); background: rgba(107,124,74,0.04); color: var(--olive); }
  .add-card-icon { font-size: 2rem; }
  .add-card-text { font-family: 'Dancing Script', cursive; font-size: 1.1rem; }

  /* ——— MODALS ——— */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,31,14,0.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }

  .form-modal { background: var(--cream); border-radius: 4px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 36px 36px 40px; position: relative; box-shadow: 0 20px 60px rgba(44,31,14,0.3); }
  .modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--taupe); z-index: 5; }
  
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); font-weight: 700; margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: #fff; border: 1.5px solid var(--taupe-light); border-radius: 3px; padding: 9px 13px; font-family: 'Lato', sans-serif; font-size: 0.88rem; outline: none; }
  .form-textarea { min-height: 80px; }
  
  .photo-upload-area { border: 2px dashed var(--taupe-light); border-radius: 4px; padding: 18px; text-align: center; cursor: pointer; position: relative; background: #fff; }
  .photo-upload-preview { width: 100%; max-height: 200px; object-fit: cover; display: none; }
  .photo-upload-preview.visible { display: block; }
  .photo-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  .ing-row, .step-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .remove-btn { background: none; border: none; color: var(--taupe); cursor: pointer; }
  .add-row-btn { background: none; border: 1px dashed var(--taupe); color: var(--taupe); padding: 6px 14px; font-size: 0.78rem; cursor: pointer; border-radius: 3px; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-sub">Libro de</span>
    <span class="logo-main">Recetas de Cami</span>
  </div>
  <div class="header-actions">
    <button class="btn-primary" onclick="openFormModal()">+ Nueva Receta</button>
  </div>
</header>

<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-title">Categorías</div>
    <div id="catList"></div>
  </aside>
  <main class="content">
    <div class="content-header">
      <div class="content-title">
        <span id="catLabel">todas las categorías</span>
        <span id="catTitle">Todas las Recetas</span>
      </div>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </main>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formOverlay">
  <div class="form-modal">
    <button class="modal-close" onclick="closeFormModal()">✕</button>
    <h2 style="font-family:'Dancing Script'; font-size:2rem; margin-bottom:20px;">Nueva Receta</h2>

    <div class="form-group">
      <label class="form-label">📸 Foto de la receta</label>
      <div class="photo-upload-area">
        <input type="file" id="fPhoto" accept="image/*">
        <img class="photo-upload-preview" id="photoPreview">
        <div id="photoPlaceholder">Hacé clic para subir una foto</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Nombre *</label>
      <input type="text" class="form-input" id="fTitle" placeholder="Ej: Tarta de cebolla">
    </div>

    <div class="form-group">
      <label class="form-label">Categoría</label>
      <select class="form-select" id="fCat">
        <option value="salado">Salado</option>
        <option value="dulce">Dulce</option>
        <option value="bebidas">Bebidas</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Ingredientes</label>
      <div id="ingList"></div>
      <button class="add-row-btn" id="addIngBtn">+ Agregar ingrediente</button>
    </div>

    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
      <button class="btn-ghost" onclick="closeFormModal()">Cancelar</button>
      <button class="btn-primary" id="saveBtn">Guardar Receta ♥</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCuHwlJanCHiu6xDJzOEt4a3SrgwnZNMe8",
    authDomain: "recetas-de-cami.firebaseapp.com",
    projectId: "recetas-de-cami",
    storageBucket: "recetas-de-cami.firebasestorage.app",
    messagingSenderId: "85795835413",
    appId: "1:85795835413:web:8703e96f06eb22d4ca081c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const recipesCol = collection(db, "recetas");

  let recipes = [];
  let currentPhotoData = null;

  // --- ESCUCHAR DATOS ---
  onSnapshot(query(recipesCol, orderBy("createdAt", "desc")), (snap) => {
    recipes = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderGrid();
    renderCats();
  });

  // --- UI FUNCTIONS ---
  window.openFormModal = () => {
    document.getElementById('formOverlay').classList.add('open');
    document.getElementById('ingList').innerHTML = '';
    addIngRow();
  };

  window.closeFormModal = () => document.getElementById('formOverlay').classList.remove('open');

  function renderGrid() {
    const grid = document.getElementById('recipeGrid');
    grid.innerHTML = `<div class="add-card" onclick="openFormModal()"><div class="add-card-icon">＋</div></div>`;
    recipes.forEach(r => {
      grid.innerHTML += `
        <div class="recipe-card">
          <div class="card-tape"></div>
          <div class="card-img-wrap">${r.photo ? `<img src="${r.photo}">` : '🥘'}</div>
          <div class="card-body">
            <div class="card-cat">${r.category}</div>
            <div class="card-title">${r.title}</div>
          </div>
        </div>`;
    });
  }

  function renderCats() {
    const list = document.getElementById('catList');
    list.innerHTML = `<div class="cat-item active"><span class="cat-icon">🍽️</span> Todas <span class="cat-count">${recipes.length}</span></div>`;
  }

  // --- EVENTOS ---
  document.getElementById('addIngBtn').onclick = () => addIngRow();

  function addIngRow() {
    const div = document.createElement('div');
    div.className = 'ing-row';
    div.innerHTML = `<input type="text" class="form-input" placeholder="Ingrediente" data-name>
                     <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('ingList').appendChild(div);
  }

  document.getElementById('fPhoto').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
      currentPhotoData = event.target.result;
      const preview = document.getElementById('photoPreview');
      preview.src = currentPhotoData;
      preview.classList.add('visible');
      document.getElementById('photoPlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(e.target.files[0]);
  };

  document.getElementById('saveBtn').onclick = async () => {
    const title = document.getElementById('fTitle').value;
    if(!title) return alert("Ponle nombre!");

    await addDoc(recipesCol, {
      title,
      category: document.getElementById('fCat').value,
      photo: currentPhotoData,
      createdAt: Date.now()
    });
    closeFormModal();
    currentPhotoData = null;
  };
</script>
</body>
</html>
