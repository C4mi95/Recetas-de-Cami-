<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas de Cami</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede5d4;
    --cream-darker: #e0d5c0;
    --brown-dark: #2c1f0e;
    --brown-mid: #5c3d1e;
    --brown-light: #8b6340;
    --olive: #6b7c4a;
    --olive-light: #8a9e60;
    --olive-pale: #c8d5a8;
    --taupe: #b8a88a;
    --taupe-light: #d4c9b0;
    --sand: #c9b89a;
    --red-cherry: #c0392b;
    --paper-texture: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      rgba(139, 99, 64, 0.06) 27px,
      rgba(139, 99, 64, 0.06) 28px
    );
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream-dark);
    background-image: var(--paper-texture);
    font-family: 'Lato', sans-serif;
    color: var(--brown-dark);
    min-height: 100vh;
  }

  /* ——— HEADER ——— */
  header {
    background-color: var(--cream);
    border-bottom: 2px solid var(--taupe);
    padding: 18px 32px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(92,61,30,0.10);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; flex-direction: column; line-height: 1; }
  .logo-main { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--brown-dark); font-weight: 700; }
  .logo-sub { font-family: 'Lato', sans-serif; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--olive); margin-top: 1px; }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn-primary { background: var(--olive); color: #fff; border: none; padding: 9px 20px; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: var(--olive-light); }
  .btn-primary:disabled { background: var(--taupe); cursor: not-allowed; }

  .btn-ghost { background: transparent; border: 1.5px solid var(--taupe); color: var(--brown-mid); padding: 8px 16px; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.82rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; }
  .btn-ghost:hover { border-color: var(--olive); color: var(--olive); }

  /* ——— MAIN LAYOUT ——— */
  .app-wrapper { display: flex; min-height: calc(100vh - 68px); }

  /* ——— SIDEBAR ——— */
  .sidebar { width: 220px; flex-shrink: 0; background: var(--cream); border-right: 1.5px solid var(--taupe-light); padding: 28px 0; position: sticky; top: 68px; height: calc(100vh - 68px); overflow-y: auto; }
  .sidebar-title { font-family: 'Lato', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--taupe); padding: 0 22px 12px; border-bottom: 1px solid var(--taupe-light); margin-bottom: 8px; }
  .cat-item { display: flex; align-items: center; gap: 9px; padding: 9px 22px; cursor: pointer; transition: background 0.15s; font-size: 0.88rem; color: var(--brown-mid); font-weight: 400; border-left: 3px solid transparent; }
  .cat-item:hover { background: var(--cream-dark); }
  .cat-item.active { background: var(--cream-dark); border-left-color: var(--olive); color: var(--olive); font-weight: 700; }
  .cat-icon { font-size: 1rem; }
  .cat-count { margin-left: auto; background: var(--cream-darker); color: var(--taupe); font-size: 0.68rem; padding: 2px 7px; border-radius: 10px; font-weight: 700; }

  /* ——— CONTENT ——— */
  .content { flex: 1; padding: 32px 36px; overflow-y: auto; }
  .content-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
  .content-title { font-family: 'Dancing Script', cursive; font-size: 2.4rem; color: var(--brown-dark); line-height: 1; }
  .content-title span { display: block; font-family: 'Lato', sans-serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); margin-bottom: 4px; font-weight: 400; }
  .search-bar { display: flex; align-items: center; background: var(--cream); border: 1.5px solid var(--taupe-light); border-radius: 4px; padding: 0 14px; gap: 8px; width: 220px; }
  .search-bar input { background: transparent; border: none; outline: none; font-family: 'Lato', sans-serif; font-size: 0.85rem; color: var(--brown-dark); padding: 8px 0; width: 100%; }
  .search-bar input::placeholder { color: var(--taupe); }
  .search-icon { color: var(--taupe); font-size: 0.9rem; }

  /* ——— RECIPE GRID ——— */
  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }

  .recipe-card { background: var(--cream); border: 1px solid var(--taupe-light); border-radius: 3px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; box-shadow: 2px 3px 8px rgba(92,61,30,0.07); position: relative; }
  .recipe-card:hover { transform: translateY(-3px); box-shadow: 4px 8px 20px rgba(92,61,30,0.13); }

  .card-tape { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 48px; height: 18px; background: rgba(184,168,138,0.55); border-radius: 2px; z-index: 2; }

  .card-img-wrap { width: 100%; height: 155px; overflow: hidden; position: relative; background: var(--cream-darker); display: flex; align-items: center; justify-content: center; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img-emoji { font-size: 2.5rem; color: var(--taupe); }

  .card-body { padding: 16px 18px 14px; background: var(--paper-texture), var(--cream); }
  .card-cat { font-size: 0.63rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--olive); font-weight: 700; margin-bottom: 5px; }
  .card-title { font-family: 'Dancing Script', cursive; font-size: 1.35rem; color: var(--brown-dark); line-height: 1.2; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 12px; font-size: 0.75rem; color: var(--taupe); }
  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .card-heart { position: absolute; bottom: 12px; right: 14px; font-size: 1rem; cursor: pointer; opacity: 0.4; transition: opacity 0.2s, transform 0.2s; color: var(--red-cherry); }
  .card-heart:hover, .card-heart.active { opacity: 1; transform: scale(1.15); }

  /* ——— MODALS ——— */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,31,14,0.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }

  .recipe-modal, .form-modal { background: var(--cream); border-radius: 4px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(44,31,14,0.3); background-image: var(--paper-texture), var(--cream); }
  .recipe-modal { max-width: 720px; }
  .form-modal { max-width: 600px; padding: 36px; }

  .modal-inner { padding: 36px 36px 40px 56px; }
  .modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--taupe); z-index: 5; }

  /* ——— PHOTO UPLOAD ——— */
  .photo-upload-area { border: 2px dashed var(--taupe-light); border-radius: 4px; padding: 18px; text-align: center; cursor: pointer; background: #fff; position: relative; }
  .photo-upload-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 3px; display: none; margin-bottom: 10px; }
  .photo-upload-preview.visible { display: block; }
  .photo-remove-btn { position: absolute; top: 8px; right: 8px; background: rgba(44,31,14,0.6); color: #fff; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; display: none; align-items: center; justify-content: center; }
  .photo-remove-btn.visible { display: flex; }

  /* Otros estilos necesarios */
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); font-weight: 700; margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; border: 1.5px solid var(--taupe-light); padding: 9px; font-family: 'Lato', sans-serif; outline: none; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--brown-dark); color: var(--cream); padding: 12px 20px; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-sub">Libro de</span>
    <span class="logo-main">Recetas de Cami</span>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" onclick="openSearch()">🔍 Buscar</button>
    <button class="btn-primary" id="saveBtn" onclick="openFormModal()">+ Nueva Receta</button>
  </div>
</header>

<div class="app-wrapper">
  <aside class="sidebar"><div class="sidebar-title">Categorías</div><div id="catList"></div></aside>
  <main class="content">
    <div class="content-header">
      <div class="content-title"><span id="catLabel">todas las categorías</span><span id="catTitle">Todas las Recetas</span></div>
      <div class="search-bar" id="searchBarWrap" style="display:none">
        <input type="text" id="searchInput" placeholder="Buscar receta..." oninput="renderGrid()">
      </div>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </main>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formOverlay" onclick="closeForm(event)">
  <div class="form-modal">
    <button class="modal-close" onclick="closeFormModal()">✕</button>
    <div class="form-group">
      <label class="form-label">📸 Foto de la receta</label>
      <div class="photo-upload-area">
        <input type="file" id="fPhoto" accept="image/*" onchange="handlePhotoUpload(event)">
        <button class="photo-remove-btn" id="photoRemoveBtn" onclick="removePhoto(event)">✕</button>
        <img class="photo-upload-preview" id="photoPreview">
        <div id="photoPlaceholder">📷 Haz clic para subir</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre *</label>
      <input type="text" class="form-input" id="fTitle">
    </div>
    <div class="form-group">
      <label class="form-label">Categoría *</label>
      <select class="form-select" id="fCat"></select>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeFormModal()">Cancelar</button>
      <button class="btn-primary" id="finalSaveBtn" onclick="saveRecipe()">Guardar Receta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCuHwlJanCHiu6xDJzOEt4a3SrgwnZNMe8",
    authDomain: "recetas-de-cami.firebaseapp.com",
    projectId: "recetas-de-cami",
    storageBucket: "recetas-de-cami.firebasestorage.app",
    messagingSenderId: "85795835413",
    appId: "1:85795835413:web:8703e96f06eb22d4ca081c"
  };

  const app = initializeApp(firebaseConfig);
  const storage = getStorage(app);

  // Variables globales para que funcionen con el HTML
  window.handlePhotoUpload = async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const saveBtn = document.getElementById('finalSaveBtn');
    saveBtn.disabled = true;
    showToast("Subiendo imagen...");

    try {
      const storageRef = ref(storage, 'recetas/' + Date.now() + "_" + file.name);
      const snapshot = await uploadBytes(storageRef, file);
      const downloadURL = await getDownloadURL(snapshot.ref);
      
      window.currentPhotoData = downloadURL;
      document.getElementById('photoPreview').src = downloadURL;
      document.getElementById('photoPreview').classList.add('visible');
      document.getElementById('photoPlaceholder').style.display = 'none';
      document.getElementById('photoRemoveBtn').classList.add('visible');
      
      showToast("Imagen lista ✅");
    } catch (error) {
      console.error(error);
      showToast("Error al subir imagen");
    } finally {
      saveBtn.disabled = false;
    }
  };
</script>

<script>
  // El resto de tu lógica de renderizado y categorías se mantiene igual
  // Solo asegúrate de que saveRecipe() use window.currentPhotoData
  
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // (Aquí irían tus funciones renderGrid, setCategory, etc., adaptadas del código original)
</script>

</body>
</html>
