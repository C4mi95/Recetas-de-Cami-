<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recetas de Cami</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede5d4;
    --cream-darker: #e0d5c0;
    --brown-dark: #2c1f0e;
    --brown-mid: #5c3d1e;
    --brown-light: #8b6340;
    --olive: #6b7c4a;
    --olive-light: #8a9e60;
    --olive-pale: #c8d5a8;
    --taupe: #b8a88a;
    --taupe-light: #d4c9b0;
    --sand: #c9b89a;
    --red-cherry: #c0392b;
    --paper-texture: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 27px,
      rgba(139, 99, 64, 0.06) 27px,
      rgba(139, 99, 64, 0.06) 28px
    );
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream-dark);
    background-image: var(--paper-texture);
    font-family: 'Lato', sans-serif;
    color: var(--brown-dark);
    min-height: 100vh;
  }

  header {
    background-color: var(--cream);
    border-bottom: 2px solid var(--taupe);
    padding: 18px 32px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(92,61,30,0.10);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; flex-direction: column; line-height: 1; }
  .logo-main { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: var(--brown-dark); font-weight: 700; }
  .logo-sub { font-family: 'Lato', sans-serif; font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--olive); margin-top: 1px; }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn-primary { background: var(--olive); color: #fff; border: none; padding: 9px 20px; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.82rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: var(--olive-light); }

  .btn-ghost { background: transparent; border: 1.5px solid var(--taupe); color: var(--brown-mid); padding: 8px 16px; border-radius: 4px; font-family: 'Lato', sans-serif; font-size: 0.82rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; }
  .btn-ghost:hover { border-color: var(--olive); color: var(--olive); }

  .app-wrapper { display: flex; min-height: calc(100vh - 68px); }

  .sidebar { width: 220px; flex-shrink: 0; background: var(--cream); border-right: 1.5px solid var(--taupe-light); padding: 28px 0; position: sticky; top: 68px; height: calc(100vh - 68px); overflow-y: auto; }
  .sidebar-title { font-family: 'Lato', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--taupe); padding: 0 22px 12px; border-bottom: 1px solid var(--taupe-light); margin-bottom: 8px; }
  .cat-item { display: flex; align-items: center; gap: 9px; padding: 9px 22px; cursor: pointer; transition: background 0.15s; font-size: 0.88rem; color: var(--brown-mid); font-weight: 400; border-left: 3px solid transparent; }
  .cat-item:hover { background: var(--cream-dark); }
  .cat-item.active { background: var(--cream-dark); border-left-color: var(--olive); color: var(--olive); font-weight: 700; }
  .cat-icon { font-size: 1rem; }
  .cat-count { margin-left: auto; background: var(--cream-darker); color: var(--taupe); font-size: 0.68rem; padding: 2px 7px; border-radius: 10px; font-weight: 700; }

  .content { flex: 1; padding: 32px 36px; overflow-y: auto; }
  .content-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; }
  .content-title { font-family: 'Dancing Script', cursive; font-size: 2.4rem; color: var(--brown-dark); line-height: 1; }
  .content-title span { display: block; font-family: 'Lato', sans-serif; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); margin-bottom: 4px; font-weight: 400; }
  .search-bar { display: flex; align-items: center; background: var(--cream); border: 1.5px solid var(--taupe-light); border-radius: 4px; padding: 0 14px; gap: 8px; width: 220px; }
  .search-bar input { background: transparent; border: none; outline: none; font-family: 'Lato', sans-serif; font-size: 0.85rem; color: var(--brown-dark); padding: 8px 0; width: 100%; }
  .search-bar input::placeholder { color: var(--taupe); }
  .search-icon { color: var(--taupe); font-size: 0.9rem; }

  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }

  .recipe-card { background: var(--cream); border: 1px solid var(--taupe-light); border-radius: 3px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; box-shadow: 2px 3px 8px rgba(92,61,30,0.07); position: relative; }
  .recipe-card:hover { transform: translateY(-3px); box-shadow: 4px 8px 20px rgba(92,61,30,0.13); }

  .card-tape { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 48px; height: 18px; background: rgba(184,168,138,0.55); border-radius: 2px; z-index: 2; }

  .card-img-wrap { width: 100%; height: 155px; overflow: hidden; position: relative; background: var(--cream-darker); display: flex; align-items: center; justify-content: center; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img-emoji { font-size: 2.5rem; color: var(--taupe); }

  .card-body { padding: 16px 18px 14px; background: var(--paper-texture), var(--cream); }
  .card-cat { font-size: 0.63rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--olive); font-weight: 700; margin-bottom: 5px; }
  .card-title { font-family: 'Dancing Script', cursive; font-size: 1.35rem; color: var(--brown-dark); line-height: 1.2; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 12px; font-size: 0.75rem; color: var(--taupe); }
  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .card-heart { position: absolute; bottom: 12px; right: 14px; font-size: 1rem; cursor: pointer; opacity: 0.4; transition: opacity 0.2s, transform 0.2s; color: var(--red-cherry); }
  .card-heart:hover, .card-heart.active { opacity: 1; transform: scale(1.15); }

  .add-card { background: transparent; border: 2px dashed var(--taupe-light); border-radius: 3px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px; cursor: pointer; transition: border-color 0.2s, background 0.2s; gap: 10px; color: var(--taupe); }
  .add-card:hover { border-color: var(--olive); background: rgba(107,124,74,0.04); color: var(--olive); }
  .add-card-icon { font-size: 2rem; }
  .add-card-text { font-family: 'Dancing Script', cursive; font-size: 1.1rem; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,31,14,0.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }

  .recipe-modal { background: var(--cream); border-radius: 4px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(44,31,14,0.3); background-image: var(--paper-texture), var(--cream); }
  .notebook-holes { position: absolute; left: 0; top: 0; bottom: 0; width: 32px; background: var(--cream-darker); border-right: 1.5px solid var(--taupe-light); display: flex; flex-direction: column; gap: 0; padding-top: 40px; z-index: 1; }
  .hole { width: 14px; height: 14px; border-radius: 50%; background: var(--cream-dark); border: 1.5px solid var(--taupe); margin: 0 auto 18px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
  .modal-inner { padding: 36px 36px 40px 56px; }
  .modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--taupe); z-index: 5; transition: color 0.2s; }
  .modal-close:hover { color: var(--brown-dark); }
  .modal-edit-btn { position: absolute; top: 14px; right: 52px; background: none; border: 1px solid var(--taupe-light); padding: 5px 12px; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--olive); cursor: pointer; border-radius: 3px; z-index: 5; transition: all 0.2s; }
  .modal-edit-btn:hover { background: var(--olive); color: #fff; border-color: var(--olive); }

  .recipe-modal-header { display: flex; gap: 28px; margin-bottom: 30px; align-items: flex-start; }

  .recipe-modal-photo {
    flex-shrink: 0;
    width: 200px;
    height: 170px;
    border: 3px solid #fff;
    box-shadow: 3px 3px 12px rgba(92,61,30,0.18), 0 0 0 1px var(--taupe-light);
    transform: rotate(1.5deg);
    background: var(--cream-darker);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: var(--taupe);
    position: relative;
    overflow: hidden;
  }
  .recipe-modal-photo::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 52px;
    height: 20px;
    background: rgba(184,168,138,0.5);
    border-radius: 2px;
    z-index: 2;
  }
  .recipe-modal-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .recipe-modal-photo .photo-emoji { position: relative; z-index: 1; }

  .recipe-modal-info { flex: 1; }
  .recipe-modal-cat { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--olive); font-weight: 700; margin-bottom: 6px; }
  .recipe-modal-title { font-family: 'Dancing Script', cursive; font-size: 2.6rem; color: var(--brown-dark); line-height: 1.1; margin-bottom: 10px; }
  .underline-deco { width: 60px; height: 2px; background: var(--olive); margin-bottom: 14px; border-radius: 2px; }
  .recipe-modal-meta { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 12px; }
  .meta-pill { display: flex; align-items: center; gap: 5px; background: var(--cream-darker); border: 1px solid var(--taupe-light); padding: 5px 12px; border-radius: 20px; font-size: 0.78rem; color: var(--brown-mid); }

  .modal-divider { border: none; border-top: 1px dashed var(--taupe-light); margin: 22px 0; }
  .modal-section-title { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--taupe); font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .modal-section-title::after { content: ''; flex: 1; height: 1px; background: var(--taupe-light); }
  .modal-two-col { display: grid; grid-template-columns: 1fr 1.6fr; gap: 32px; }

  .ingredients-list { list-style: none; }
  .ingredients-list li { display: flex; align-items: baseline; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--cream-darker); font-size: 0.88rem; color: var(--brown-mid); }
  .ingredients-list li::before { content: '•'; color: var(--olive); flex-shrink: 0; }
  .ing-qty { font-weight: 700; color: var(--brown-dark); flex-shrink: 0; }

  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li { counter-increment: steps; display: flex; gap: 12px; margin-bottom: 14px; font-size: 0.88rem; color: var(--brown-mid); line-height: 1.55; }
  .step-num { flex-shrink: 0; width: 24px; height: 24px; background: var(--taupe-light); color: var(--brown-mid); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; margin-top: 1px; }

  .tips-box { margin-top: 22px; background: var(--cream-darker); border: 1px solid var(--taupe-light); border-left: 3px solid var(--olive); padding: 14px 18px; border-radius: 3px; }
  .tips-box-title { font-family: 'Dancing Script', cursive; font-size: 1rem; color: var(--olive); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .tips-box p { font-size: 0.83rem; color: var(--brown-mid); line-height: 1.5; }

  .form-modal { background: var(--cream); border-radius: 4px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 36px 36px 40px; position: relative; box-shadow: 0 20px 60px rgba(44,31,14,0.3); }
  .form-title { font-family: 'Dancing Script', cursive; font-size: 2rem; color: var(--brown-dark); margin-bottom: 6px; }
  .form-subtitle { font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); margin-bottom: 24px; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--taupe); font-weight: 700; margin-bottom: 6px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: #fff; border: 1.5px solid var(--taupe-light); border-radius: 3px; padding: 9px 13px; font-family: 'Lato', sans-serif; font-size: 0.88rem; color: var(--brown-dark); outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--olive); }
  .form-textarea { min-height: 90px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  .photo-upload-area {
    border: 2px dashed var(--taupe-light);
    border-radius: 4px;
    padding: 18px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    background: #fff;
  }
  .photo-upload-area:hover { border-color: var(--olive); background: rgba(107,124,74,0.03); }
  .photo-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-upload-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 3px; margin-bottom: 10px; display: none; }
  .photo-upload-preview.visible { display: block; }
  .photo-upload-hint { font-size: 0.8rem; color: var(--taupe); }
  .photo-upload-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .photo-remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(44,31,14,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-size: 0.75rem;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2;
    transition: background 0.2s;
  }
  .photo-remove-btn.visible { display: flex; }
  .photo-remove-btn:hover { background: var(--red-cherry); }

  .ing-row, .step-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .ing-row input { flex: 1; }
  .step-row input { flex: 1; }
  .step-num-badge { width: 26px; height: 26px; background: var(--taupe-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: var(--brown-mid); flex-shrink: 0; }
  .remove-btn { background: none; border: none; color: var(--taupe); cursor: pointer; font-size: 1rem; transition: color 0.2s; padding: 2px 4px; }
  .remove-btn:hover { color: var(--red-cherry); }
  .add-row-btn { background: none; border: 1px dashed var(--taupe); color: var(--taupe); padding: 6px 14px; font-size: 0.78rem; cursor: pointer; border-radius: 3px; margin-top: 4px; transition: all 0.2s; font-family: 'Lato', sans-serif; }
  .add-row-btn:hover { border-color: var(--olive); color: var(--olive); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; color: var(--taupe); }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-title { font-family: 'Dancing Script', cursive; font-size: 1.6rem; color: var(--brown-light); margin-bottom: 6px; }
  .empty-sub { font-size: 0.85rem; max-width: 260px; line-height: 1.5; }

  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--brown-dark); color: var(--cream); padding: 12px 20px; border-radius: 4px; font-size: 0.85rem; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 700px) {
    .sidebar { display: none; }
    .modal-two-col { grid-template-columns: 1fr; }
    .recipe-modal-header { flex-direction: column; }
    .form-row { grid-template-columns: 1fr 1fr; }
    .content { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-sub">Libro de</span>
    <span class="logo-main">Recetas de Cami</span>
  </div>
  <div class="header-actions">
    <button class="btn-ghost" onclick="openSearch()">🔍 Buscar</button>
    <button class="btn-primary" onclick="openFormModal()">+ Nueva Receta</button>
  </div>
</header>

<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-title">Categorías</div>
    <div id="catList"></div>
  </aside>
  <main class="content">
    <div class="content-header">
      <div class="content-title">
        <span id="catLabel">todas las categorías</span>
        <span id="catTitle">Todas las Recetas</span>
      </div>
      <div class="search-bar" id="searchBarWrap" style="display:none">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar receta..." oninput="renderGrid()">
      </div>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </main>
</div>

<!-- DETALLE MODAL -->
<div class="modal-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="recipe-modal" id="detailModal">
    <div class="notebook-holes" id="notebookHoles"></div>
    <button class="modal-close" onclick="closeDetailModal()">✕</button>
    <button class="modal-edit-btn" onclick="editCurrentRecipe()">Editar</button>
    <div class="modal-inner" id="detailContent"></div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal-overlay" id="formOverlay" onclick="closeForm(event)">
  <div class="form-modal" id="formModal">
    <button class="modal-close" onclick="closeFormModal()">✕</button>
    <div class="form-title" id="formTitle">Nueva Receta</div>
    <div class="form-subtitle">Completá los datos de tu receta</div>

    <div class="form-group">
      <label class="form-label">📸 Foto de la receta (opcional)</label>
      <div class="photo-upload-area" id="photoUploadArea">
        <input type="file" id="fPhoto" accept="image/*" onchange="handlePhotoUpload(event)">
        <button class="photo-remove-btn" id="photoRemoveBtn" onclick="removePhoto(event)">✕</button>
        <img class="photo-upload-preview" id="photoPreview" alt="Vista previa">
        <div id="photoPlaceholder">
          <div class="photo-upload-icon">📷</div>
          <div class="photo-upload-hint">Hacé clic para subir una foto<br><small>Mantené las fotos livianas para mejor carga</small></div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Nombre de la receta *</label>
      <input type="text" class="form-input" id="fTitle" placeholder="Ej: Tarta de cebolla">
    </div>
    <div class="form-group">
      <label class="form-label">Categoría *</label>
      <select class="form-select" id="fCat"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">⏱ Preparación</label>
        <input type="text" class="form-input" id="fPrep" placeholder="Ej: 20 min">
      </div>
      <div class="form-group">
        <label class="form-label">🔥 Cocción</label>
        <input type="text" class="form-input" id="fCook" placeholder="Ej: 45 min">
      </div>
      <div class="form-group">
        <label class="form-label">🍽 Porciones</label>
        <input type="text" class="form-input" id="fPortions" placeholder="Ej: 6">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Emoji o ícono (opcional)</label>
      <input type="text" class="form-input" id="fEmoji" placeholder="Ej: 🍕">
    </div>
    <div class="form-group">
      <label class="form-label">Ingredientes *</label>
      <div id="ingList"></div>
      <button class="add-row-btn" onclick="addIng()">+ Agregar ingrediente</button>
    </div>
    <div class="form-group">
      <label class="form-label">Pasos *</label>
      <div id="stepList"></div>
      <button class="add-row-btn" onclick="addStep()">+ Agregar paso</button>
    </div>
    <div class="form-group">
      <label class="form-label">💡 Tips (opcional)</label>
      <textarea class="form-textarea" id="fTips" placeholder="Consejos o secretos..."></textarea>
    </div>

    <div class="form-actions">
      <button class="btn-ghost" onclick="closeFormModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveRecipe()">Guardar Receta ♥</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

<script>
// CONFIGURACIÓN DE FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCuHwlJanCHiu6xDJzOEt4a3SrgwnZNMe8",
  authDomain: "recetas-de-cami.firebaseapp.com",
  projectId: "recetas-de-cami",
  storageBucket: "recetas-de-cami.firebasestorage.app",
  messagingSenderId: "85795835413",
  appId: "1:85795835413:web:8703e96f06eb22d4ca081c",
  measurementId: "G-TD4CKXG2QP"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CATEGORIES = [
  { id: 'todas', label: 'Todas', icon: '📖' },
  { id: 'entradas', label: 'Entradas', icon: '🥗' },
  { id: 'principales', label: 'Principales', icon: '🍽' },
  { id: 'carnes', label: 'Carnes', icon: '🥩' },
  { id: 'pastas', label: 'Pastas', icon: '🍝' },
  { id: 'panificados', label: 'Panificados', icon: '🍞' },
  { id: 'ensaladas', label: 'Ensaladas', icon: '🥬' },
  { id: 'guarniciones', label: 'Guarniciones', icon: '🥔' },
  { id: 'dips-salsas', label: 'Dips y Salsas', icon: '🫙' },
  { id: 'postres', label: 'Postres', icon: '🍰' },
  { id: 'bebidas', label: 'Bebidas', icon: '🥤' },
  { id: 'otros', label: 'Otros', icon: '✨' },
];

let recipes = [];
let activeCategory = 'todas';
let editingId = null;
let currentDetailId = null;
let ingCount = 0;
let stepCount = 0;
let currentPhotoData = null;

// ESCUCHAR CAMBIOS EN FIREBASE (TIEMPO REAL)
db.ref('recipes').on('value', (snapshot) => {
  const data = snapshot.val();
  recipes = data ? Object.values(data).reverse() : [];
  renderSidebar();
  renderGrid();
});

function renderSidebar() {
  const el = document.getElementById('catList');
  el.innerHTML = CATEGORIES.map(c => {
    const count = c.id === 'todas' ? recipes.length : recipes.filter(r => r.category === c.id).length;
    return `<div class="cat-item ${activeCategory === c.id ? 'active' : ''}" onclick="setCategory('${c.id}', '${c.label}')">
      <span class="cat-icon">${c.icon}</span>
      <span>${c.label}</span>
      <span class="cat-count">${count}</span>
    </div>`;
  }).join('');
}

function setCategory(id, label) {
  activeCategory = id;
  document.getElementById('catTitle').textContent = id === 'todas' ? 'Todas las Recetas' : label;
  document.getElementById('catLabel').textContent = id === 'todas' ? 'todas las categorías' : 'categoría';
  renderSidebar();
  renderGrid();
}

function cardImageHTML(r, cat) {
  if (r.photo) return `<div class="card-img-wrap"><img src="${r.photo}" alt="${r.title}" loading="lazy"></div>`;
  return `<div class="card-img-wrap"><span class="card-img-emoji">${r.emoji || (cat ? cat.icon : '📖')}</span></div>`;
}

function renderGrid() {
  const grid = document.getElementById('recipeGrid');
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let list = recipes.filter(r => {
    const catOk = activeCategory === 'todas' || r.category === activeCategory;
    const qOk = !q || r.title.toLowerCase().includes(q);
    return catOk && qOk;
  });

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🌿</div><div class="empty-title">Sin resultados</div></div>`;
    if (!q) grid.innerHTML += `<div class="add-card" onclick="openFormModal()"><div class="add-card-icon">＋</div><div class="add-card-text">Agregar receta</div></div>`;
    return;
  }

  grid.innerHTML = list.map(r => {
    const cat = CATEGORIES.find(c => c.id === r.category);
    return `<div class="recipe-card" onclick="openDetail('${r.id}')">
      <div class="card-tape"></div>
      ${cardImageHTML(r, cat)}
      <div class="card-body">
        <div class="card-cat">${cat ? cat.label : r.category}</div>
        <div class="card-title">${r.title}</div>
        <div class="card-meta">
          ${r.prep ? `<span>⏱ ${r.prep}</span>` : ''}
          ${r.portions ? `<span>🍽 ${r.portions} porc.</span>` : ''}
        </div>
      </div>
      <span class="card-heart ${r.fav ? 'active' : ''}" onclick="toggleFav(event,'${r.id}')">♥</span>
    </div>`;
  }).join('');

  if (!q) grid.innerHTML += `<div class="add-card" onclick="openFormModal()"><div class="add-card-icon">＋</div><div class="add-card-text">Agregar receta</div></div>`;
}

function toggleFav(e, id) {
  e.stopPropagation();
  const r = recipes.find(r => r.id === id);
  if (r) db.ref('recipes/' + id).update({ fav: !r.fav });
}

function buildHoles() {
  document.getElementById('notebookHoles').innerHTML = Array(12).fill('<div class="hole"></div>').join('');
}

function openDetail(id) {
  const r = recipes.find(r => r.id === id);
  if (!r) return;
  currentDetailId = id;
  const cat = CATEGORIES.find(c => c.id === r.category);
  buildHoles();
  document.getElementById('detailContent').innerHTML = `
    <div class="recipe-modal-header">
      <div class="recipe-modal-photo">
        ${r.photo ? `<img src="${r.photo}" alt="${r.title}">` : `<span class="photo-emoji">${r.emoji || (cat ? cat.icon : '📖')}</span>`}
      </div>
      <div class="recipe-modal-info">
        <div class="recipe-modal-cat">${cat ? cat.icon + ' ' + cat.label : r.category}</div>
        <div class="recipe-modal-title">${r.title}</div>
        <div class="underline-deco"></div>
        <div class="recipe-modal-meta">
          ${r.prep ? `<div class="meta-pill">⏱ <span>${r.prep}</span></div>` : ''}
          ${r.cook ? `<div class="meta-pill">🔥 <span>${r.cook}</span></div>` : ''}
          ${r.portions ? `<div class="meta-pill">🍽 <span>${r.portions} porciones</span></div>` : ''}
        </div>
      </div>
    </div>
    <hr class="modal-divider">
    <div class="modal-two-col">
      <div>
        <div class="modal-section-title">Ingredientes</div>
        <ul class="ingredients-list">
          ${r.ingredients ? r.ingredients.map(i => `<li><span class="ing-qty">${i.qty}</span>${i.name}</li>`).join('') : ''}
        </ul>
      </div>
      <div>
        <div class="modal-section-title">Pasos</div>
        <ol class="steps-list">
          ${r.steps ? r.steps.map((s,i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('') : ''}
        </ol>
      </div>
    </div>
    ${r.tips ? `<div class="tips-box"><div class="tips-box-title">💡 Tips</div><p>${r.tips}</p></div>` : ''}
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetailModal() { document.getElementById('detailOverlay').classList.remove('open'); }
function closeDetail(e) { if (e.target === document.getElementById('detailOverlay')) closeDetailModal(); }

function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    currentPhotoData = e.target.result;
    showPhotoPreview(currentPhotoData);
  };
  reader.readAsDataURL(file);
}

function showPhotoPreview(src) {
  const p = document.getElementById('photoPreview');
  p.src = src; p.classList.add('visible');
  document.getElementById('photoPlaceholder').style.display = 'none';
  document.getElementById('photoRemoveBtn').classList.add('visible');
}

function clearPhotoPreview() {
  const p = document.getElementById('photoPreview');
  p.src = ''; p.classList.remove('visible');
  document.getElementById('photoPlaceholder').style.display = '';
  document.getElementById('photoRemoveBtn').classList.remove('visible');
  document.getElementById('fPhoto').value = '';
}

function removePhoto(e) {
  e.preventDefault(); e.stopPropagation();
  currentPhotoData = null; clearPhotoPreview();
}

function populateCatSelect() {
  document.getElementById('fCat').innerHTML = CATEGORIES.filter(c => c.id !== 'todas').map(c =>
    `<option value="${c.id}">${c.icon} ${c.label}</option>`
  ).join('');
}

function addIng(val = { qty: '', name: '' }) {
  ingCount++;
  const div = document.createElement('div');
  div.className = 'ing-row';
  div.innerHTML = `
    <input type="text" class="form-input" style="max-width:100px" placeholder="Cant." value="${val.qty}" data-ing-qty="${ingCount}">
    <input type="text" class="form-input" placeholder="Ingrediente" value="${val.name}" data-ing-name="${ingCount}">
    <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('ingList').appendChild(div);
}

function addStep(val = '') {
  stepCount++;
  const div = document.createElement('div');
  div.className = 'step-row';
  div.innerHTML = `
    <span class="step-num-badge">${stepCount}</span>
    <input type="text" class="form-input" placeholder="Describe el paso..." value="${val}">
    <button class="remove-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  document.getElementById('stepList').appendChild(div);
}

function openFormModal(id = null) {
  editingId = id; currentPhotoData = null; populateCatSelect();
  document.getElementById('ingList').innerHTML = '';
  document.getElementById('stepList').innerHTML = '';
  clearPhotoPreview();

  if (id) {
    const r = recipes.find(r => r.id === id);
    document.getElementById('formTitle').textContent = 'Editar Receta';
    document.getElementById('fTitle').value = r.title;
    document.getElementById('fCat').value = r.category;
    document.getElementById('fPrep').value = r.prep || '';
    document.getElementById('fCook').value = r.cook || '';
    document.getElementById('fPortions').value = r.portions || '';
    document.getElementById('fEmoji').value = r.emoji || '';
    document.getElementById('fTips').value = r.tips || '';
    if (r.photo) { currentPhotoData = r.photo; showPhotoPreview(r.photo); }
    if (r.ingredients) r.ingredients.forEach(i => addIng(i));
    if (r.steps) r.steps.forEach(s => addStep(s));
  } else {
    document.getElementById('formTitle').textContent = 'Nueva Receta';
    document.getElementById('fTitle').value = '';
    addIng(); addIng(); addStep();
  }
  document.getElementById('formOverlay').classList.add('open');
}

function closeFormModal() { document.getElementById('formOverlay').classList.remove('open'); }
function closeForm(e) { if (e.target === document.getElementById('formOverlay')) closeFormModal(); }

function saveRecipe() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { showToast('⚠️ Ingresá un nombre'); return; }

  const ings = [];
  document.querySelectorAll('#ingList .ing-row').forEach(row => {
    const qty = row.querySelector('[data-ing-qty]').value.trim();
    const name = row.querySelector('[data-ing-name]').value.trim();
    if (name) ings.push({ qty, name });
  });

  const steps = [];
  document.querySelectorAll('#stepList .step-row input').forEach(inp => {
    if (inp.value.trim()) steps.push(inp.value.trim());
  });

  const data = {
    title,
    category: document.getElementById('fCat').value,
    prep: document.getElementById('fPrep').value.trim(),
    cook: document.getElementById('fCook').value.trim(),
    portions: document.getElementById('fPortions').value.trim(),
    emoji: document.getElementById('fEmoji').value.trim(),
    photo: currentPhotoData || null,
    tips: document.getElementById('fTips').value.trim(),
    ingredients: ings,
    steps,
    fav: editingId ? recipes.find(r => r.id === editingId).fav : false
  };

  if (editingId) {
    data.id = editingId;
    db.ref('recipes/' + editingId).set(data);
    showToast('✏️ Receta actualizada');
  } else {
    const newRef = db.ref('recipes').push();
    data.id = newRef.key;
    newRef.set(data);
    showToast('✨ Receta guardada');
  }
  closeFormModal();
}

function editCurrentRecipe() { closeDetailModal(); openFormModal(currentDetailId); }
function openSearch() {
  const w = document.getElementById('searchBarWrap');
  w.style.display = w.style.display === 'none' ? 'flex' : 'none';
  if (w.style.display === 'flex') document.getElementById('searchInput').focus();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
</body>
</html>
